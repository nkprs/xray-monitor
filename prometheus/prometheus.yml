global:
  scrape_interval: 30s
  evaluation_interval: 30s
  scrape_timeout: 10s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - 127.0.0.1:9090

  - job_name: xray
    metrics_path: /scrape
    static_configs:
      - targets:
          - 127.0.0.1:9550

  - job_name: node
    static_configs:
      - targets:
          - 127.0.0.1:9100
