services:
  xray-exporter:
    build:
      context: ./docker/xray-exporter
      args:
        XRAY_EXPORTER_VERSION: ${XRAY_EXPORTER_VERSION:-v0.2.0}
    image: local/xray-exporter:${XRAY_EXPORTER_VERSION:-v0.2.0}
    container_name: xray-exporter
    restart: unless-stopped
    network_mode: host
    mem_limit: ${XRAY_EXPORTER_MEM_LIMIT:-64m}
    command:
      - -l
      - ${XRAY_EXPORTER_LISTEN:-127.0.0.1:9550}
      - -e
      - ${XRAY_API_ENDPOINT:-127.0.0.1:62789}
      - -p
      - ${XRAY_ACCESS_LOG:-/var/log/xray/access.log}
    volumes:
      - ${XRAY_ACCESS_LOG_DIR:-/var/log/xray}:${XRAY_ACCESS_LOG_DIR:-/var/log/xray}:ro

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    network_mode: host
    mem_limit: ${PROMETHEUS_MEM_LIMIT:-256m}
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-2d}
      - --storage.tsdb.retention.size=${PROMETHEUS_RETENTION_SIZE:-512MB}
      - --storage.tsdb.wal-compression
      - --query.max-concurrency=${PROMETHEUS_QUERY_MAX_CONCURRENCY:-4}
      - --query.timeout=${PROMETHEUS_QUERY_TIMEOUT:-30s}
      - --web.enable-lifecycle
      - --web.listen-address=${PROMETHEUS_LISTEN_ADDRESS:-127.0.0.1:9090}
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    network_mode: host
    mem_limit: ${NODE_EXPORTER_MEM_LIMIT:-64m}
    command:
      - --web.listen-address=${NODE_EXPORTER_LISTEN_ADDRESS:-127.0.0.1:9100}
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/host/root
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($|/)
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro,rslave

volumes:
  prometheus-data:
